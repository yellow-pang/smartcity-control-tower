spring:
  application:
    name: backend
  profiles:
    active: ${SPRING_PROFILE_ACTIVE:dev}
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:smartops}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:smartops_user}
    password: ${DB_PASSWORD:ChangeMe!1234}
    driver-class-name: org.mariadb.jdbc.Driver
  mybatis:
    mapper-locations: classpath*:mapper/**/*.xml
    type-aliases-package: com.yellowpang.backend
    configuration:
      map-underscore-to-camel-case: true
      jdbc-type-for-null: null
      default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

jwt:
  secret-key: ${JWT_SECRET_KEY:your-secret-key-change-in-production-with-min-256bits}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

logging:
  level:
    root: INFO
    com.yellowpang.backend: INFO
    org.springframework.security: WARN
    org.mybatis: INFO
