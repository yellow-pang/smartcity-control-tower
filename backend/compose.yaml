services:
  mariadb:
    image: "mariadb:11.4"
    container_name: smartcity-mariadb
    environment:
      MARIADB_DATABASE: smartcity
      MARIADB_ROOT_PASSWORD: root_password_123
      MARIADB_USER: smartcity_user
      MARIADB_PASSWORD: smartcity_password_123
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./db:/docker-entrypoint-initdb.d
    networks:
      - smartcity-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: "adminer:latest"
    container_name: smartcity-adminer
    ports:
      - "8180:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - smartcity-network
    environment:
      ADMINER_DEFAULT_SERVER: mariadb

volumes:
  mariadb_data:
    driver: local

networks:
  smartcity-network:
    driver: bridge
